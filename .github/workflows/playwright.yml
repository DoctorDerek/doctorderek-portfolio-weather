name: Playwright E2E Pipeline

on:
  deployment_status:

permissions:
  pull-requests: write
  contents: read

jobs:
  e2e:
    name: Playwright E2E Tests
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'Preview'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Get Playwright Version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright Tests and Capture Summary
        id: playwright
        if: always()
        run: |
          set +e
          pnpm exec playwright test --pass-with-no-tests 2>&1 | tee "$RUNNER_TEMP/playwright-output.txt"
          PLAYWRIGHT_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "PLAYWRIGHT_EXIT_CODE=$PLAYWRIGHT_EXIT_CODE" >> "$GITHUB_ENV"
          echo "PLAYWRIGHT_OUTPUT_FILE=$RUNNER_TEMP/playwright-output.txt" >> "$GITHUB_ENV"
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ github.event.deployment_status.target_url }}

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Post Playwright PR Comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          retries: 3
          script: |
            const fs = require('fs');
            const deploymentSha = context.payload.deployment.sha;
            const deploymentRef = context.payload.deployment.ref;
            const outputPath = process.env.PLAYWRIGHT_OUTPUT_FILE;
            const output = outputPath && fs.existsSync(outputPath)
              ? fs.readFileSync(outputPath, 'utf8')
              : '';
            const cleanOutput = output.replace(/\u001b\[[0-9;]*m/g, '');
            const exitCode = Number.parseInt(process.env.PLAYWRIGHT_EXIT_CODE ?? '', 10);
            const header = '### 🎭 Playwright';
            const qualityPosition = '**Quality check 3 of 3**';
            const summaryLines = cleanOutput
              .split(/\r?\n/)
              .filter(line => /Running \d+ tests?|\d+ (passed|failed|flaky|skipped)|Error:/.test(line))
              .slice(-12);
            const fallbackLines = cleanOutput
              .split(/\r?\n/)
              .filter(Boolean)
              .slice(-12);
            const summary = (summaryLines.length > 0 ? summaryLines : fallbackLines).join('\n');
            const status = Number.isInteger(exitCode) && exitCode === 0
              ? '✅ **Playwright completed successfully.**'
              : '❌ **Playwright tests failed or the runner could not complete.**';
            const previewUrl = context.payload.deployment_status.target_url;
            const previewLink = previewUrl ? `\n\n[Open preview deployment](${previewUrl})` : '';
            const body = `${header}\n\n${qualityPosition}\n\n${status}${summary ? `\n\n\`\`\`text\n${summary}\n\`\`\`` : ''}${previewLink}`;

            const { data: associatedPullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: deploymentSha,
            });
            let pullRequests = associatedPullRequests;

            if (pullRequests.length === 0 && deploymentRef) {
              const { data: matchingPullRequests } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${deploymentRef}`,
                state: 'open',
              });
              pullRequests = matchingPullRequests;
            }

            const pullRequest = pullRequests.find(
              candidate => candidate.state === 'open' && candidate.head.sha === deploymentSha,
            ) ?? pullRequests.find(candidate => candidate.state === 'open') ?? pullRequests[0];

            if (!pullRequest) {
              core.warning(`No pull request is associated with deployment ${deploymentSha}.`);
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: pullRequest.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const botComment = comments.find(
              comment => comment.user.type === 'Bot' && comment.body?.includes(header),
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: pullRequest.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Enforce Playwright Result
        if: always()
        run: |
          if ! [[ "$PLAYWRIGHT_EXIT_CODE" =~ ^[0-9]+$ ]] || [ "$PLAYWRIGHT_EXIT_CODE" -ne 0 ]; then
            echo "Playwright tests failed or the runner could not complete."
            exit 1
          fi
